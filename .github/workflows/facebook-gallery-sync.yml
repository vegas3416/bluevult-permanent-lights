name: Sync Facebook Gallery

on:
  workflow_dispatch:
  schedule:
    # Every day at 6:15 AM UTC (1:15 AM Central Standard, 2:15 AM Central Daylight)
    - cron: "15 6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Supabase Facebook gallery sync
        env:
          SUPABASE_FUNCTION_URL: https://furdzzydlyfopouazyoj.supabase.co/functions/v1/sync-facebook-gallery
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GALLERY_SYNC_SECRET: ${{ secrets.GALLERY_SYNC_SECRET }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" -X POST "$SUPABASE_FUNCTION_URL" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-gallery-sync-secret: ${GALLERY_SYNC_SECRET}")

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)

          echo "HTTP $status"
          echo "$body"

          if [ "$status" -ge 400 ]; then
            echo "Sync failed" >&2
            exit 1
          fi
